name: Bug report
description: Report a problem with the installer, agents, skills, or MCP servers
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in the fields below.
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Arch)
        - Linux (Other)
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Tier installed
      options:
        - lean
        - standard
        - full
        - not sure
    validations:
      required: true
  - type: input
    id: opencode-version
    attributes:
      label: opencode version
      description: Run `opencode --version` if available, or check the TUI.
      placeholder: "e.g. 1.3.0"
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Exact command you ran
      placeholder: ".\\install.ps1 -Tier standard"
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Full output (or paste link)
      description: Paste the full output of the command, or a link to a paste/gist.
    validations:
      required: true
  - type: textarea
    id: manifest
    attributes:
      label: Manifest contents
      description: Contents of `~/.config/opencode/.power-pack-manifest.json` (if it exists).
      render: json
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant? Workarounds you tried?
    validations:
      required: false
